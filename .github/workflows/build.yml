name: Build Android APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - run: flutter create --project-name protube_app . 
      
      # 🌐 निंजा तकनीक 1: इंटरनेट परमिशन
      - run: sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/g' android/app/src/main/AndroidManifest.xml

      # 🚀 अल्टीमेट निंजा तकनीक: API 34 फिक्स (चाहे फाइल .gradle हो या .kts, यह दोनों को फिक्स करेगा)
      - run: find android/app -type f -name "build.gradle*" -exec sed -i 's/flutter.compileSdkVersion/34/g' {} +
      
      - run: flutter pub get
      
      # 🥷 सॉलिड ब्रह्मास्त्र: ProGuard एरर का पक्का इलाज
      - name: Fix Proguard Error
        run: find /home/runner/.pub-cache/hosted/pub.dev/ -type f -name "build.gradle*" -path "*/flutter_inappwebview*/android/build.gradle*" -exec sed -i 's/proguard-android.txt/proguard-android-optimize.txt/g' {} +
      
      - run: flutter build apk --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
