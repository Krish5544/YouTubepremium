name: Build Android APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - run: flutter create --project-name protube_app . 
      
      # 🌐 निंजा तकनीक 1: इंटरनेट परमिशन
      - run: sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/g' android/app/src/main/AndroidManifest.xml

      - run: flutter pub get

      # 🛡️ सेफ फिक्स 1: पुराने API 33 को 34 पर लाना
      - name: Patch API levels safely
        run: |
          find /home/runner/.pub-cache/hosted/pub.dev/ -type f -name "build.gradle*" -exec sed -i 's/compileSdkVersion 33/compileSdkVersion 34/g' {} +
          find /home/runner/.pub-cache/hosted/pub.dev/ -type f -name "build.gradle*" -exec sed -i 's/compileSdk 33/compileSdk 34/g' {} +
      
      # 🚀 सबसे सुरक्षित फिक्स: बिना फाइलें छेड़े Gradle को Java 11 का रूल देना
      - name: Safe Gradle JVM Patch
        run: |
          cat <<EOF >> android/build.gradle
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty("android")) {
                      project.android {
                          compileOptions {
                              sourceCompatibility JavaVersion.VERSION_11
                              targetCompatibility JavaVersion.VERSION_11
                          }
                      }
                  }
                  project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                      kotlinOptions {
                          jvmTarget = "11"
                      }
                  }
              }
          }
          EOF
      
      # 🥷 ProGuard फिक्स
      - name: Fix Proguard Error
        run: find /home/runner/.pub-cache/hosted/pub.dev/ -type f -name "build.gradle*" -path "*/flutter_inappwebview*/android/build.gradle*" -exec sed -i 's/proguard-android.txt/proguard-android-optimize.txt/g' {} +
      
      - run: flutter build apk --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
