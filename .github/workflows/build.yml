name: Build Android APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - run: flutter create --project-name protube_app . 
      
      # 🚀 निंजा तकनीक 3: Android API 34 अपडेट (Share_plus पैकेज के लिए) 🚀
      - run: |
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 34/g' android/app/build.gradle
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' android/app/build.gradle
      
      # 🌐 निंजा तकनीक 1: इंटरनेट परमिशन
      - run: sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/g' android/app/src/main/AndroidManifest.xml
      
      - run: flutter pub get
      
      # 🥷 निंजा तकनीक 2: InAppWebView ProGuard फिक्स
      - run: sed -i "s/proguard-android.txt/proguard-android-optimize.txt/g" /home/runner/.pub-cache/hosted/pub.dev/flutter_inappwebview_android-*/android/build.gradle
      
      - run: flutter build apk --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
